name: Release — LogosForge Whiteboard (Windows)

# Builds the Windows installer + portable exe for LogosForge Whiteboard desktop.
# The artifact is fully self-contained: the Electron shell + the renderer +
# a PyInstaller-bundled copy of the Whiteboard backend (which embeds the Python
# core) — no Python needed on the user's machine.
#
# Triggers:
#   * push a tag like  whiteboard-v0.1.0  -> builds AND publishes a GitHub Release
#   * manual "Run workflow"               -> builds + uploads artifacts (no Release)
#
# NOTE: Pro's Windows release lives in release-windows.yml and triggers on v*
# tags; this one uses whiteboard-v* so the two products release independently
# from the same monorepo. (Mac/Linux targets are a later milestone.)
#
# Assumes a single monorepo checkout containing: logosforge/ (core) and
# whiteboard-desktop/. The whiteboard renderer is self-contained (it has no
# shared-ui file: deps), so only those two siblings are required. If these ever
# become separate repos, replace the single checkout with multiple checkouts
# (with path:) so they end up as siblings.

on:
  push:
    tags:
      - "whiteboard-v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Attach the build to a GitHub Release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-whiteboard-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Verify monorepo layout
        run: |
          missing=""
          for d in logosforge whiteboard-desktop; do
            [ -d "$d" ] || missing="$missing $d"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required sibling dir(s):$missing — this workflow expects a single monorepo checkout containing the core (logosforge/) and whiteboard-desktop/."
            exit 1
          fi
          echo "monorepo layout OK"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --- 1. Bundle the Whiteboard backend (it embeds the core) -----------
      - name: Build the backend bundle (PyInstaller)
        run: |
          python -m venv build-venv
          ./build-venv/Scripts/python.exe -m pip install --upgrade pip
          ./build-venv/Scripts/python.exe -m pip install "./logosforge[export]" fastapi "uvicorn[standard]" httpx pyinstaller
          cd whiteboard-desktop/backend
          ../../build-venv/Scripts/python.exe -m PyInstaller logosforge-whiteboard-backend.spec --noconfirm --clean --log-level WARN

      - name: Smoke-test the bundled backend
        run: |
          ./whiteboard-desktop/backend/dist/logosforge-whiteboard-backend/logosforge-whiteboard-backend.exe --host 127.0.0.1 --port 8799 &
          ok=""
          for i in $(seq 1 30); do
            sleep 1
            code=$(curl -s --max-time 2 -o /dev/null -w "%{http_code}" http://127.0.0.1:8799/health || true)
            if [ "$code" = "200" ]; then ok="yes"; echo "backend healthy after ${i}s"; break; fi
          done
          # Reliable teardown on Windows: signals from git-bash don't stop a
          # native console exe, so kill the image directly (//-escaped for bash).
          taskkill //F //IM logosforge-whiteboard-backend.exe //T 2>/dev/null || true
          if [ -z "$ok" ]; then echo "::error::bundled backend failed /health"; exit 1; fi

      # --- 2. Build + package the Electron app -----------------------------
      - name: Install whiteboard-desktop deps
        working-directory: whiteboard-desktop/desktop
        # npm ci = deterministic install from the committed lockfile. The
        # renderer is self-contained (no file: deps), so this is the only install.
        run: npm ci

      - name: Build renderer + main, then package (NSIS + portable)
        working-directory: whiteboard-desktop/desktop
        run: npm run dist:win
        env:
          # Unsigned build (no code-signing cert configured). Users will see a
          # Windows SmartScreen prompt until a cert is added — see repo notes.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # --- 3. Publish ------------------------------------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logosforge-whiteboard-windows
          path: whiteboard-desktop/desktop/release/*.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/whiteboard-v') || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          files: whiteboard-desktop/desktop/release/*.exe
          draft: false
          generate_release_notes: true
